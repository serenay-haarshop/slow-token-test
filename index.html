/* ─────────────────────────────────────────────
   SITEMAP SELECTOR + RELATED LINKS
───────────────────────────────────────────── */
function getSiteMap(lang){
  return lang==="de" ? SITE_MAP_DE : lang==="en" ? SITE_MAP_EN : SITE_MAP_NL;
}

function getRelated(url, lang){
  const cfg = DOMAIN_CONFIG[lang||"nl"];
  const map = getSiteMap(lang||"nl");
  const base = cfg.base;
  const path = url.replace(base,"");
  const segs = path.split("/").filter(Boolean);

  // directe kinderen
  const kids = map.filter(p=>{
    const pp = p.url.replace(base,"");
    return pp.startsWith(path+"/") && pp.split("/").filter(Boolean).length===segs.length+1;
  });

  // siblings: pagina's met hetzelfde parent-segment
  const parentSeg = segs.length>1 ? segs[segs.length-2] : null;
  const sibs = parentSeg ? map.filter(p=>{
    if(p.url===url) return false;
    const pp = p.url.replace(base,"");
    const ps = pp.split("/").filter(Boolean);
    return ps.length===segs.length && ps[segs.length-2]===parentSeg;
  }) : [];

  return [...kids,...sibs].slice(0,5).map(p=>({
    label:p.label, url:p.url,
    relation:kids.includes(p)?"child":"sibling"
  }));
}

function getSystem(lang){
  const cfg=DOMAIN_CONFIG[lang||"nl"];
  const nlRules=`VERBOD 1: Nooit een opsommingsteken of streepje gebruiken om zinnen te beginnen of te structureren. Schrijf altijd in lopende alinea's. Het enige geldige gebruik van een koppelteken is als grammaticaal verbindingsteken (bijv. "leave-in conditioner").
VERBOD 2: Nooit klinken als een AI. Vermijd: "Of je nu...", "Of het nu...", "Nicht nur... sondern auch...", "Whether you...", "Denk aan...", "Kortom...", "Bovendien", "Tevens", "Daarnaast", "Ten eerste", "Ten tweede", "In conclusie", "uitzonderlijk", "ideaal", "optimaal", "essentieel". Schrijf zoals een mens praat.`;
  if(lang==="de") return `Du bist der Senior-SEO-Texter von ${cfg.brand}. Du schreibst wie ein erfahrener Redakteur, der die Marke seit Jahren kennt — warm, fachkundig und direkt.

LOKALISIERUNG: Bevor du schreibst, suche die Top-3-Seiten auf Google.de für das primäre Keyword. Analysiere deren Sprache, Terminologie und Ton. Schreibe wie ein nativer Muttersprachler aus der deutschen Beauty-Branche — keine wörtliche Übersetzung aus dem Niederländischen. Verwende deutsche Produktnamen, Markennamen und beauty-spezifische Begriffe wie sie in deutschen Magazinen und Blogs genutzt werden (z.B. "Haarpflegeritual", "Pflegekur", "Haarmaske", "Tiefenpflege", "Kämmbarkeit").

${nlRules.replace(/Nooit/g,"Niemals").replace(/Schrijf altijd/g,"Schreib immer")}

TONE OF VOICE: ${cfg.brand} spricht Kunden mit "du" und "dein" an. Ton ist warm, kompetent aber nicht übermäßig jovial. Denk an den Stil von DM-Blog oder Cosnova-Redaktion.
SEO BOLD-REGELN: Primäres Keyword fett (<strong>keyword</strong>) im ersten oder zweiten Satz. Sekundäre Keywords einmal fett.
KEYWORD-VOLUMINA: DE-Markt. Haarpflege gesamt 80k-120k/Mon. Conditioner 18k-25k. Shampoo 45k-65k. Immer eine genaue Zahl. CPC in Euro. KD 0-100.
ÜBERSETZUNG: Liefere zu jedem Textfeld auch eine natürliche niederländische Übersetzung im nl-Feld. Diese ist für niederländische Kollegen gedacht und muss flüssiges Niederländisch sein — keine wörtliche Übersetzung.`;
  if(lang==="en") return `You are the senior SEO copywriter for ${cfg.brand}. You write like an experienced editor who has known the brand for years — warm, expert and direct.

LOCALISATION: Before writing, search the top 3 pages on Google.nl for the primary keyword in English. Study their language patterns, terminology and editorial tone. Write like a native English speaker in the international beauty industry — not translated Dutch. Use terminology familiar to English-speaking shoppers in the Netherlands (e.g. "hair mask", "leave-in conditioner", "curl cream", "frizz control", "heat protection"). Reference international beauty trends when relevant.

${nlRules}

TONE OF VOICE: ${cfg.brand} addresses customers with "you" and "your". Tone is warm but not overly casual. Think Cult Beauty or Space NK editorial style.
SEO BOLD RULES: Primary keyword bold (<strong>keyword</strong>) in first or second sentence of intro. Secondary keywords bold once.
KEYWORD VOLUMES: NL market in English. Hair care total 60k-80k/mth. Conditioner 22k-28k. Shampoo 40k-55k. Always one exact number. CPC in euros. KD 0-100.
TRANSLATION: For every text field also provide a natural Dutch translation in the nl field. This is for Dutch colleagues who need to review and understand the English content.`;
  return `Jij bent de senior SEO-copywriter van ${cfg.brand}. Je schrijft alsof je een ervaren redacteur bent die het merk al jaren kent — warm, deskundig en direct.

LOKALISATIE: Analyseer voor het primaire zoekwoord de top 3 pagina's op Google.nl. Gebruik hun taalpatronen en terminologie als inspiratie voor authentiek klinkende, beter rankende tekst.

${nlRules}

TONE OF VOICE: ${cfg.brand} spreekt klanten aan met "je" en "jouw". Toon is warm maar niet overdreven joviaal.
SEO BOLD-REGELS: Primair zoekwoord vet (<strong>keyword</strong>) in eerste of tweede zin van intro. Secundaire zoekwoorden één keer vet.
KEYWORD VOLUMES: NL markt. Haarverzorging totaal 60k-80k/mnd. Conditioner 22k-28k. Shampoo 40k-55k. Altijd één exact getal. CPC in euro. KD 0-100.`;
}

let _key=localStorage.getItem("hs_key")||"";
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function saveKey(k){_key=k;localStorage.setItem("hs_key",k);}

async function claude(msg,tokens=4000,search=false,lang="nl"){
  if(!_key)throw new Error("Geen API-sleutel.");
  const body={model:"claude-sonnet-4-20250514",max_tokens:tokens,system:getSystem(lang),messages:[{role:"user",content:msg}]};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":_key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body),
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return(d.content||[]).map(b=>b.text||"").join("");
}

function xj(raw){const s=raw.indexOf("{"),e=raw.lastIndexOf("}");if(s<0||e<0)throw new Error("Geen JSON.");return JSON.parse(raw.slice(s,e+1));}

async function analyse(url,lang){
  const cfg=DOMAIN_CONFIG[lang||domainFromUrl(url)||"nl"];
  const slug=url.replace(cfg.base,"").split("/").filter(Boolean).pop()||"";
  const rel=getRelated(url,lang);
  const ll={nl:"Nederlands",de:"Duits",en:"Engels"}[lang];

  const searchNote = lang==="de"
    ? "Voer de SERP-analyse uit op Google.de (Duitsland). Zoekers zijn Duits, concurrenten zijn Duitse webshops. Gebruik zoekvolumes voor de DE-markt."
    : lang==="en"
    ? "Run SERP analysis on Google.nl (Netherlands) but in English. Searchers use English queries. Use NL search volumes."
    : "Voer de SERP-analyse uit op Google.nl (Nederland). Gebruik zoekvolumes voor de NL-markt.";

  const siteLinks=getSiteMap(lang).slice(0,8).map(p=>`${p.label} → ${p.url}`).join(" | ");

  // gap altijd in het Nederlands, rankFactors in de doeltaal
  const p=`URL: ${url}\nDomein: ${cfg.brand}\nTaal: ${ll}\nSlug: "${slug}"\nGerelateerde pagina's (gebruik ALLEEN deze URLs voor interne links): ${rel.map(r=>r.label+" → "+r.url).join(" | ")}\nTop-categorieën van dit domein: ${siteLinks}\n\n${searchNote}\n\nBELANGRIJK: Het veld "gap" moet ALTIJD in het Nederlands worden geschreven, ongeacht de taal. Het is bedoeld voor Nederlandse collega's die de kans willen begrijpen.\n\nRetourneer uitsluitend dit JSON:\n\n{"pageType":"categorie","slug":"${slug}","brand":null,"productTypes":["type1"],"hairNeeds":["behoefte1"],"internalLinks":[{"label":"naam","url":"${cfg.base}/juiste-pad","relation":"child"}],"keywords":[{"term":"primair","type":"primary","volumeMonthly":22400,"cpc":0.85,"kd":42,"intent":"transactioneel","trend":"stabiel"},{"term":"long-tail","type":"secondary","volumeMonthly":4800,"cpc":0.60,"kd":28,"intent":"transactioneel","trend":"stijgend"},{"term":"informatief","type":"secondary","volumeMonthly":2200,"cpc":0.40,"kd":18,"intent":"informatief","trend":"stabiel"},{"term":"variant4","type":"secondary","volumeMonthly":1600,"cpc":0.35,"kd":22,"intent":"transactioneel","trend":"stijgend"},{"term":"variant5","type":"secondary","volumeMonthly":890,"cpc":0.30,"kd":14,"intent":"transactioneel","trend":"stabiel"}],"competitors":[{"position":1,"domain":"domein.de","url":"https://url","da":82,"organicTraffic":95000,"rankFactors":["Reden in doeltaal als volledige zin","Reden twee"],"gap":"Kans voor ${cfg.brand} IN HET NEDERLANDS als volledige zin."},{"position":2,"domain":"domein2.de","url":"https://url2","da":75,"organicTraffic":60000,"rankFactors":["reden in doeltaal","reden"],"gap":"Kans in het Nederlands."},{"position":3,"domain":"domein3.de","url":"https://url3","da":68,"organicTraffic":40000,"rankFactors":["reden","reden"],"gap":"Kans in het Nederlands."}]}`;
  return xj(await claude(p,2800,true,lang));
}

async function genContent(a,lang){
  const cfg=DOMAIN_CONFIG[lang||"nl"];
  const ll={nl:"Nederlands",de:"Duits",en:"Engels"}[lang];
  const pk=a.keywords?.find(k=>k.type==="primary")||a.keywords?.[0];
  const sec=(a.keywords||[]).filter(k=>k.type==="secondary").map(k=>k.term);
  const validLinks=(a.internalLinks||[]).filter(l=>getSiteMap(lang).some(s=>s.url===l.url)||(l.url||"").startsWith(cfg.base));
  const lnk=validLinks.map(l=>`${l.label} (${l.url})`).join(", ");

  const locNote = lang==="de"
    ? `LOKALISATIE VOOR DUITSLAND: Analyseer via web search de top 3 presterende pagina's op Google.de voor het primaire zoekwoord. Gebruik echte Duitse zoekintenties, terminologie en zinsconstructies die Duits publiek aanspreekt. Geen directe vertaling van Nederlands — schrijf zoals een native Duitser in de beauty-sector schrijft. Gebruik "Sie" NIET, gebruik "du/dein". Verwijs naar bekende Duitse beautycultuur waar relevant.`
    : lang==="en"
    ? `LOCALISATION FOR NL-ENGLISH MARKET: Search top 3 performing pages on Google.nl for the primary keyword in English. Write in natural British/international English as used in professional beauty editorial — not translated Dutch. Reference international beauty trends and ingredient terminology that English-speaking shoppers in the Netherlands recognise.`
    : `LOKALISATIE: Analyseer de top 3 presterende pagina's op Google.nl voor het primaire zoekwoord en gebruik hun taalpatronen als inspiratie voor een betere tekst.`;

  const translNote = lang!=="nl"
    ? `\n\nVERPLICHT EXTRA VELD: Voeg aan elke tekstsectie ook een "nl" veld toe met een natuurlijke Nederlandse vertaling van die tekst. Dit is voor Nederlandse collega's die de ${ll} tekst willen begrijpen en controleren. De Nederlandse vertaling moet vloeiend Nederlands zijn, niet letterlijk vertaald.\n\nJSON structuur voor mainContent blokken:\n{"heading":"Duits/Engels heading","body":"Duits/Engels body","nl":{"heading":"Nederlandse vertaling heading","body":"Nederlandse vertaling body"}}\n\nEn voor introText, h1, metaTitle, metaDescription ook een nlTranslation veld toevoegen:`
    : "";

  const p=`Taal: ${ll}\nDomein: ${cfg.brand} (${cfg.base})\nPaginatype: ${a.pageType}\nPrimair zoekwoord: "${pk?.term}"\nSecundaire zoekwoorden: ${sec.join(", ")}\nMerk: ${a.brand||"n.v.t."}\nProducttypes: ${(a.productTypes||[]).join(", ")}\nHaarbehoeften: ${(a.hairNeeds||[]).join(", ")}\nInterne pagina's — gebruik ALLEEN deze URLs: ${lnk||"geen"}\n\nBELANGRIJK: Alle interne links moeten beginnen met ${cfg.base}. Nooit links naar andere domeinen.\n\n${locNote}${translNote}\n\nSchrijf in ${ll}. Alleen lopende zinnen. Geen opsommingstekens. Geen structurerende streepjes. Geen AI-constructies. Gebruik <strong>tag</strong> voor vette zoekwoorden.\n\nRetourneer uitsluitend dit JSON (met nl-vertaalvelden bij DE/EN):\n\n{"h1":"Paginatitel max 60 tekens","h1Nl":"Nederlandse vertaling h1 (alleen bij DE/EN)","metaTitle":"Meta title max 60 tekens","metaTitleNl":"NL vertaling (alleen bij DE/EN)","metaDescription":"Meta description max 155 tekens","metaDescriptionNl":"NL vertaling (alleen bij DE/EN)","introText":"2-3 zinnen max 55 woorden, primair zoekwoord vet.","introTextNl":"Nederlandse vertaling van introText (alleen bij DE/EN)","mainContent":{"h2_what":{"heading":"H2","body":"2-3 alineas gescheiden door \\n\\n","nl":{"heading":"NL heading","body":"NL body"}},"h2_hairtype":{"heading":"H2","body":"2-3 alineas","nl":{"heading":"NL","body":"NL"},"h3_tips":{"heading":"H3","body":"1-2 alineas","nl":{"heading":"NL","body":"NL"}}},"h2_why":{"heading":"H2","body":"2 alineas","nl":{"heading":"NL","body":"NL"},"h3_combine":{"heading":"H3","body":"1-2 alineas met interne link naar ${cfg.base}/...","nl":{"heading":"NL","body":"NL"}}},"h2_howto":{"heading":"H2","body":"2 alineas","nl":{"heading":"NL","body":"NL"},"h3_daily":{"heading":"H3","body":"1 alinea","nl":{"heading":"NL","body":"NL"}}}},"schemaFAQ":[{"question":"Vraag in doeltaal?","answer":"Antwoord in doeltaal.","questionNl":"Nederlandse vertaling vraag","answerNl":"Nederlandse vertaling antwoord"}],"aiSnippet":"60-75 woorden feitelijke alinea voor Google SGE in doeltaal.","aiSnippetNl":"Nederlandse vertaling aiSnippet (alleen bij DE/EN)"}`;
  // web search ON: used for localization research (top performing pages in target market)
  return xj(await claude(p,5500,true,lang));
}

function buildHTML(c,a){
  const mc=c.mainContent||{};
  const p=t=>(t||"").split(/\n\n+/).filter(Boolean).map(x=>`<p>${x.trim()}</p>`).join("\n");
  const faq={"@context":"https://schema.org","@type":"FAQPage",mainEntity:(c.schemaFAQ||[]).map(f=>({"@type":"Question",name:f.question,acceptedAnswer:{"@type":"Answer",text:f.answer}}))};
  return`<!-- Haarshop.nl SEO — gegenereerd door SEO Content Machine -->\n\n<!-- INTRO: staat boven de producten via category-intro class -->\n<p class="category-intro">${c.introText||""}</p>\n\n<!-- HOOFDTEKST: staat onder de producten -->\n<h2>${mc.h2_what?.heading||""}</h2>\n${p(mc.h2_what?.body)}\n\n<h2>${mc.h2_hairtype?.heading||""}</h2>\n${p(mc.h2_hairtype?.body)}\n<h3>${mc.h2_hairtype?.h3_tips?.heading||""}</h3>\n${p(mc.h2_hairtype?.h3_tips?.body)}\n\n<h2>${mc.h2_why?.heading||""}</h2>\n${p(mc.h2_why?.body)}\n<h3>${mc.h2_why?.h3_combine?.heading||""}</h3>\n${p(mc.h2_why?.h3_combine?.body)}\n\n<h2>${mc.h2_howto?.heading||""}</h2>\n${p(mc.h2_howto?.body)}\n<h3>${mc.h2_howto?.h3_daily?.heading||""}</h3>\n${p(mc.h2_howto?.h3_daily?.body)}\n\n<!-- AI SNIPPET: verborgen voor bezoekers, zichtbaar voor Google SGE en AI-tools -->\n<div itemprop="description" style="display:none">${c.aiSnippet||""}</div>\n\n<!-- FAQ SCHEMA: structuurdata voor uitklapbare vragen in Google -->\n<script type="application/ld+json">\n${JSON.stringify(faq,null,2)}\n<\/script>`.trim();
}

function VolBar({val}){const pct=Math.min(100,Math.round((val/60000)*100));const col=pct>55?"#2e7d32":pct>25?C.beige:"#bbb";const fmt=val>=1000?(val/1000).toFixed(1)+"k":val;return<div className="vw"><div className="vbg"><div className="vfill" style={{width:`${pct}%`,background:col}}/></div><span style={{fontSize:12,fontWeight:700,color:C.ink}}>{fmt}</span></div>;}
function KdPill({kd}){const col=kd>65?C.red:kd>40?"#e67e22":"#27ae60";const lbl=kd>65?"Hoog":kd>40?"Gemid.":"Laag";return<span className="pill" style={{background:col+"18",color:col,border:`1px solid ${col}30`}}><span style={{width:5,height:5,borderRadius:"50%",background:col,display:"inline-block"}}/>{kd} · {lbl}</span>;}
function IntentTag({intent}){const m={transactioneel:[C.beige,C.blush2],informatief:[C.green,"#e8f5ee"],navigatief:["#666","#f0f0f0"]};const[col,bg]=m[(intent||"").toLowerCase()]||["#777","#eee"];return<span className="pill" style={{background:bg,color:col}}>{intent}</span>;}
function TrendBadge({trend}){const m={stijgend:["#27ae60","↗"],dalend:[C.red,"↘"],stabiel:["#999","→"]};const[col,icon]=m[trend]||["#999","→"];return<span style={{color:col,fontSize:15,fontWeight:800}}>{icon}</span>;}

function App(){
  const[hasKey,sHasKey]=useState(!!localStorage.getItem("hs_key"));
  const[url,sUrl]=useState("");
  const[lang,sLang]=useState("nl");
  const[phase,sPhase]=useState("idle");
  const[status,sStatus]=useState("");
  const[a,sA]=useState(null);
  const[c,sC]=useState(null);
  const[html,sHtml]=useState("");
  const[err,sErr]=useState(null);
  const[tab,sTab]=useState("intro");
  const[hl,sHl]=useState("intro");
  const[prev,sPrev]=useState(false);
  const[pushed,sPushed]=useState(false);

  useEffect(()=>{const m={intro:"intro",main:"main",seo:"seo",ai:"ai",meta:"h1",faq:"h1",magento:"h1"};sHl(m[tab]||"intro");},[tab]);

  const doAnalyse=useCallback(async()=>{
    if(!url.trim())return;sErr(null);sPhase("analyzing");sStatus("Live SERP-data ophalen voor Google Nederland…");
    try{const r=await analyse(url.trim(),lang);sA(r);sPhase("reviewing");}
    catch(e){sErr(e.message);sPhase("idle");}
  },[url,lang]);

  const doGen=useCallback(async()=>{
    if(!a)return;sErr(null);sPhase("generating");
    for(let i=8;i>0;i--){sStatus(`Wacht ${i} seconden om rate limit te vermijden…`);await sleep(1000);}
    sStatus("Menselijk klinkende SEO-teksten schrijven…");
    try{const r=await genContent(a,lang);sC(r);sHtml(buildHTML(r,a));sPhase("done");sTab("intro");sPrev(true);}
    catch(e){sErr(e.message);sPhase("reviewing");}
  },[a,lang]);

  const reset=()=>{sPhase("idle");sA(null);sC(null);sErr(null);sPrev(false);};

  if(!hasKey)return<KeyScreen onSave={()=>sHasKey(true)}/>;

  const TABS=[{k:"intro",l:"Introductie"},{k:"main",l:"Hoofdtekst"},{k:"meta",l:"Meta & H1"},{k:"faq",l:"FAQ Schema"},{k:"ai",l:"AI Snippet"},{k:"magento",l:"Magento 2"}];

  return<>

    </header>

    <main style={{maxWidth:1400,margin:"0 auto",padding:"26px 24px",display:"flex",flexDirection:"column",gap:20}}>

      {/* URL INPUT — haarshop banner stijl */}
      <div className="fu" style={{background:C.blush2,border:`1px solid ${C.blush}`,borderRadius:12,padding:"28px 32px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-30,top:-40,width:220,height:220,borderRadius:"50%",background:C.blush,opacity:.4,pointerEvents:"none"}}/>
        <div style={{position:"absolute",right:70,bottom:-60,width:150,height:150,borderRadius:"50%",background:C.blush,opacity:.25,pointerEvents:"none"}}/>
        <div style={{position:"relative"}}>
          <div style={{fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:".09em",color:C.beige,marginBottom:7}}>Stap 1</div>
          <div style={{fontSize:24,fontWeight:900,color:C.ink,marginBottom:6,lineHeight:1.2}}>Welke pagina ga je optimaliseren?</div>
          <div style={{fontSize:14,color:C.ink3,marginBottom:22}}>Plak een categorie-URL — het domein wordt automatisch herkend.</div>
          {/* Domein badge */}
          {(()=>{
            const detected=domainFromUrl(url);
            const cfg=DOMAIN_CONFIG[detected];
            const labels={nl:"🇳🇱 haarshop.nl · Zoeklocatie: Nederland · Taal: NL",de:"🇩🇪 haarshop.de · Zoeklocatie: Duitsland · Taal: DE",en:"🇬🇧 haarshop.com · Zoeklocatie: Nederland · Taal: EN"};
            return url.includes("haarshop")&&<div style={{display:"inline-flex",alignItems:"center",gap:7,background:"#fff",border:`1.5px solid ${C.beige}`,borderRadius:20,padding:"5px 14px",marginBottom:14,fontSize:12,fontWeight:700,color:C.ink}}>
              <span style={{color:C.green}}>✓</span> {labels[detected]}
              <span style={{color:C.ink3,fontWeight:600}}>· {cfg.location} SERP-analyse</span>
            </div>;
          })()}
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <input type="url" value={url} onChange={e=>{const v=e.target.value;sUrl(v);const d=domainFromUrl(v);sLang(d);}} onKeyDown={e=>e.key==="Enter"&&phase==="idle"&&doAnalyse()} placeholder="https://www.haarshop.nl/haarverzorging/conditioners" style={{flex:1,fontSize:14,borderRadius:24,padding:"12px 20px"}}/>
            <button className="btn btn-primary" onClick={phase==="idle"?doAnalyse:reset} disabled={phase==="analyzing"||phase==="generating"} style={{padding:"12px 28px",fontSize:14,flexShrink:0}}>
              {phase==="analyzing"?<><Spin s={15}/> Analyseren…</>:phase==="idle"?"Analyseer →":"↺ Opnieuw"}
            </button>
          </div>
          {/* Snel starten per domein */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[
              {domain:"haarshop.nl",base:"https://www.haarshop.nl/haarverzorging",slugs:["conditioners","haarmasker","shampoo","haarolie","haarstyling","haarkleuringen"]},
              {domain:"haarshop.de",base:"https://www.haarshop.de/haarpflege",slugs:["conditioner","haarmaske","shampoo","haaroel","haarstyling","haarfarben"]},
              {domain:"haarshop.com",base:"https://www.haarshop.com/hair-care",slugs:["conditioner","hair-mask","shampoo","hair-oil","styling-finishing","hair-coloring"]},
            ].map(({domain,base,slugs})=>(
              <div key={domain} style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:10.5,fontWeight:800,color:C.ink3,width:90,flexShrink:0}}>{domain}</span>
                {slugs.map(s=>(
                  <button key={s} onClick={()=>{const fullUrl=`${base}/${s}`;sUrl(fullUrl);sLang(domainFromUrl(fullUrl));}} style={{fontSize:11.5,padding:"4px 12px",borderRadius:20,cursor:"pointer",background:"#fff",color:C.ink2,border:`1px solid ${C.bdr}`,fontFamily:"var(--f)",fontWeight:600}}>/{s}</button>
                ))}
              </div>
            ))}
          </div>
        </div>
        {(phase==="analyzing"||phase==="generating")&&<div style={{marginTop:18,display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,.85)",borderRadius:10,padding:"12px 18px"}}><Spin s={18}/><span style={{fontSize:13,fontWeight:700,color:C.ink}}>{status}</span></div>}
        {err&&<div style={{marginTop:14,background:"#fef0ef",border:`1px solid #f5c6c2`,borderRadius:10,padding:"12px 18px",fontSize:13,color:C.red,fontWeight:700}}>⚠ {err}</div>}
      </div>

      {/* REVIEW */}

        <div className="fu grid2">
          <div className="col">
            {/* Keyword tabel */}
            <div className="card fu">
              <div style={{padding:"16px 20px 12px",borderBottom:`1px solid ${C.bdr}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div><div style={{fontSize:16,fontWeight:900,color:C.ink}}>Keyword Research</div><div style={{fontSize:12,color:C.ink3,marginTop:2}}>Live SERP-analyse · Google Nederland · {new Date().toLocaleDateString("nl-NL",{day:"numeric",month:"long"})}</div></div>
                <span className="pill" style={{background:C.blush2,color:C.beige,border:`1px solid ${C.blush}`}}>{(a.keywords||[]).length} zoekwoorden</span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table className="kw-table">
                  <thead><tr>{["Zoekwoord","Type","Vol./mnd","CPC","KD","Intent","Trend"].map(h=><th key={h}>{h}</th>)}</tr></thead>
                  <tbody>{(a.keywords||[]).map((kw,i)=>(
                    <tr key={i} className={kw.type==="primary"?"pr":""}>
                      <td style={{fontWeight:kw.type==="primary"?900:600,color:C.ink}}>
                        {kw.type==="primary"&&<span className="tag" style={{background:C.ink,color:"#fff",marginRight:8}}>Primair</span>}{kw.term}
                      </td>
                      <td><span className="tag" style={{background:C.cream,color:C.ink3,border:`1px solid ${C.bdr}`}}>{kw.type}</span></td>
                      <td><VolBar val={kw.volumeMonthly}/></td>
                      <td style={{fontWeight:700,color:C.ink}}>€{Number(kw.cpc).toFixed(2)}</td>
                      <td><KdPill kd={kw.kd}/></td>
                      <td><IntentTag intent={kw.intent}/></td>
                      <td><TrendBadge trend={kw.trend}/></td>
                    </tr>
                  ))}</tbody>
                </table>

        <div style={{fontSize:28,fontWeight:900,color:C.ink,marginBottom:10}}>Haarshop SEO Content Machine</div>
        <div style={{fontSize:15,color:C.ink3,maxWidth:500,margin:"0 auto 38px",lineHeight:1.8}}>Plak een URL, de tool analyseert de Google NL SERP, berekent zoekvolumes en schrijft publiceerbare content die menselijk klinkt.</div>
        <div style={{display:"flex",gap:13,justifyContent:"center",flexWrap:"wrap"}}>
          {[["📊","Keyword Research","Live SERP-analyse voor NL"],["🏆","Concurrentieanalyse","DA, verkeer en rangoorzaken"],["✍️","Menselijke copy","Geen AI-uitstraling, geen opsommingen"],["👁","Pagina-preview","Zie exact waar tekst staat"],["⚡","Magento 2","Direct publiceren via REST API"]].map(([icon,title,sub])=>(
            <div key={title} style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:12,padding:"17px 19px",width:180,textAlign:"left",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
              <div style={{fontSize:21,marginBottom:7}}>{icon}</div>
              <div style={{fontSize:13.5,fontWeight:800,color:C.ink,marginBottom:3}}>{title}</div>
              <div style={{fontSize:12,color:C.ink3,lineHeight:1.5}}>{sub}</div>
            </div>
          ))}
        </div>
      </div>}
    </main>

    {/* Ahrefs notice */}
    <div style={{position:"fixed",bottom:20,right:20,zIndex:300,background:C.ink,color:"#fff",borderRadius:10,padding:"11px 15px",fontSize:12,fontFamily:"var(--f)",maxWidth:230,boxShadow:"0 4px 20px rgba(0,0,0,.2)",lineHeight:1.6}}>
      <div style={{fontWeight:800,marginBottom:2}}>Ahrefs niet gekoppeld</div>
      <div style={{opacity:.6,fontSize:11}}>Verbind Ahrefs voor exacte API-volumes. Nu actief: SERP-analyse.</div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
